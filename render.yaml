services:
  - type: web
    name: trao-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  - type: web
    name: trao-web
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: trao-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
